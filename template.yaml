AWSTemplateFormatVersion: '2010-09-09'
Description: Tax Line AI - Invoice Tax Classification Service

Parameters:
  OpenAIApiKey:
    Type: String
    NoEcho: true
  NotificationEmail:
    Type: String
    Description: Email address to receive invoice processing notifications

Resources:
  OpenAIApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: tax-line-ai/openai-api-key
      SecretString: !Sub '{"OPENAI_API_KEY":"${OpenAIApiKey}"}'

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: tax-line-ai-access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  # use Sub to avoid a circular dependency
                  - !Sub arn:aws:s3:::tax-line-ai-${AWS::AccountId}-${AWS::Region}
                  - !Sub arn:aws:s3:::tax-line-ai-${AWS::AccountId}-${AWS::Region}/*
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource: !GetAtt DataTable.Arn
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:tax-line-ai/openai-api-key*
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref InvoiceTopic

  InvoiceTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: tax-line-ai-invoices

  InvoiceTopicEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref InvoiceTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  DependenciesLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: tax-line-ai-dependencies
      CompatibleRuntimes:
        - python3.12
      Content: layer/

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: tax-line-ai
      Runtime: python3.12
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code: src/
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          TABLE_NAME: !Ref DataTable
          BUCKET_NAME: !Sub tax-line-ai-${AWS::AccountId}-${AWS::Region}
          OPENAI_API_KEY: !Sub '{{resolve:secretsmanager:${OpenAIApiKeySecret}:SecretString:OPENAI_API_KEY}}'
      Layers:
        - !Ref DependenciesLayer

  ProcessLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: tax-line-ai-process
      Runtime: python3.12
      Handler: process.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code: src/
      Timeout: 300
      MemorySize: 256
      Environment:
        Variables:
          TABLE_NAME: !Ref DataTable
          BUCKET_NAME: !Sub tax-line-ai-${AWS::AccountId}-${AWS::Region}
          OPENAI_API_KEY: !Sub '{{resolve:secretsmanager:${OpenAIApiKeySecret}:SecretString:OPENAI_API_KEY}}'
          SNS_TOPIC_ARN: !Ref InvoiceTopic
          API_BASE_URL: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
      Layers:
        - !Ref DependenciesLayer

  LambdaS3Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ProcessLambda.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub arn:aws:s3:::tax-line-ai-${AWS::AccountId}-${AWS::Region}

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: tax-line-ai
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
        AllowHeaders:
          - content-type

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt LambdaFunction.Arn
      PayloadFormatVersion: '2.0'

  HealthRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /health
      Target: !Sub integrations/${HttpApiIntegration}

  PostInvoiceRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /invoice
      Target: !Sub integrations/${HttpApiIntegration}

  GetInvoiceRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /invoice/{id}
      Target: !Sub integrations/${HttpApiIntegration}

  GetInvoiceFileRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /invoice/{id}/file
      Target: !Sub integrations/${HttpApiIntegration}

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true

  DataBucket:
    Type: AWS::S3::Bucket
    DependsOn: LambdaS3Permission
    Properties:
      BucketName: !Sub tax-line-ai-${AWS::AccountId}-${AWS::Region}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - content-type
            AllowedMethods:
              - PUT
            AllowedOrigins:
              - '*'
            MaxAge: 3600
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: uploads/
            Function: !GetAtt ProcessLambda.Arn

  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub tax-line-ai-${AWS::AccountId}-website
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  WebsiteOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: tax-line-ai-website-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  WebsiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: tax-line-ai website
        DefaultRootObject: index.html
        Enabled: true
        HttpVersion: http2
        PriceClass: PriceClass_100
        Origins:
          - Id: WebsiteBucketOrigin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt WebsiteOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: WebsiteBucketOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${WebsiteBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebsiteDistribution}

  DataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tax-line-ai
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  LambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*

Outputs:
  ApiEndpoint:
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
  DataBucketName:
    Value: !Ref DataBucket
  DataTableName:
    Value: !Ref DataTable
  InvoiceTopicArn:
    Value: !Ref InvoiceTopic
  WebsiteBucketName:
    Value: !Ref WebsiteBucket
  WebsiteUrl:
    Value: !Sub https://${WebsiteDistribution.DomainName}
