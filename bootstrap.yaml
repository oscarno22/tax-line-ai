AWSTemplateFormatVersion: '2010-09-09'
Description: Tax Line AI - Bootstrap (run once to set up deployment infrastructure)

Parameters:
  GitHubOrg:
    Type: String
    Default: oscarno22
  GitHubRepo:
    Type: String
    Default: tax-line-ai

Resources:
  ArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub tax-line-ai-artifacts-${AWS::AccountId}

  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: tax-line-ai-github-actions
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubRepo}:*
      Policies:
        - PolicyName: DeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:GetTemplateSummary
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                Resource: !Sub arn:aws:cloudformation:*:${AWS::AccountId}:stack/tax-line-ai/*
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub arn:aws:s3:::tax-line-ai-artifacts-${AWS::AccountId}/*
              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:DeleteFunction
                  - lambda:TagResource
                Resource: !Sub arn:aws:lambda:*:${AWS::AccountId}:function:tax-line-ai*
              - Effect: Allow
                Action:
                  - apigateway:POST
                  - apigateway:PUT
                  - apigateway:PATCH
                  - apigateway:GET
                  - apigateway:DELETE
                  - apigateway:TagResource
                Resource: '*'
              - Effect: Allow
                Action:
                  - lambda:PublishLayerVersion
                  - lambda:DeleteLayerVersion
                  - lambda:GetLayerVersion
                Resource: !Sub arn:aws:lambda:*:${AWS::AccountId}:layer:tax-line-ai-*
              - Effect: Allow
                Action:
                  - lambda:AddPermission
                  - lambda:RemovePermission
                Resource: !Sub arn:aws:lambda:*:${AWS::AccountId}:function:tax-line-ai*
              - Effect: Allow
                Action:
                  - dynamodb:CreateTable
                  - dynamodb:DeleteTable
                  - dynamodb:DescribeTable
                  - dynamodb:UpdateTable
                  - dynamodb:TagResource
                  - dynamodb:UntagResource
                  - dynamodb:ListTagsOfResource
                  - dynamodb:BatchWriteItem
                Resource: !Sub arn:aws:dynamodb:*:${AWS::AccountId}:table/tax-line-ai
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:PutBucketPublicAccessBlock
                  - s3:GetBucketPublicAccessBlock
                  - s3:PutBucketTagging
                  - s3:GetBucketTagging
                  - s3:GetBucketNotification
                  - s3:PutBucketNotification
                  - s3:PutBucketPolicy
                  - s3:GetBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:PutBucketCORS
                  - s3:GetBucketCORS
                  - s3:ListBucket
                Resource: !Sub arn:aws:s3:::tax-line-ai-${AWS::AccountId}-*
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:GetObject
                Resource: !Sub arn:aws:s3:::tax-line-ai-${AWS::AccountId}-*/*
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:GetRole
                  - iam:PassRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:TagRole
                Resource: !Sub arn:aws:iam::${AWS::AccountId}:role/tax-line-ai-*
              - Effect: Allow
                Action:
                  - sns:CreateTopic
                  - sns:DeleteTopic
                  - sns:GetTopicAttributes
                  - sns:SetTopicAttributes
                  - sns:TagResource
                  - sns:Subscribe
                  - sns:Unsubscribe
                  - sns:ListSubscriptionsByTopic
                Resource: !Sub arn:aws:sns:*:${AWS::AccountId}:tax-line-ai-*
              - Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:PutSecretValue
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DeleteSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:TagResource
                Resource: !Sub arn:aws:secretsmanager:*:${AWS::AccountId}:secret:tax-line-ai/*
              - Effect: Allow
                Action:
                  - cloudfront:CreateDistribution
                  - cloudfront:UpdateDistribution
                  - cloudfront:GetDistribution
                  - cloudfront:GetDistributionConfig
                  - cloudfront:DeleteDistribution
                  - cloudfront:TagResource
                  - cloudfront:CreateOriginAccessControl
                  - cloudfront:UpdateOriginAccessControl
                  - cloudfront:GetOriginAccessControl
                  - cloudfront:DeleteOriginAccessControl
                Resource: '*'

Outputs:
  ArtifactsBucketName:
    Value: !Ref ArtifactsBucket
  GitHubActionsRoleArn:
    Value: !GetAtt GitHubActionsRole.Arn
    Description: Add this as AWS_DEPLOY_ROLE_ARN in GitHub Actions secrets
