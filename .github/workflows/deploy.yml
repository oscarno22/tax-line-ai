name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build Lambda layer
        run: |
          uv export --no-dev --no-hashes -o layer/requirements.txt
          uv pip install \
            -r layer/requirements.txt \
            --target layer/python

      - name: Package CloudFormation template
        run: |
          aws cloudformation package \
            --template-file template.yaml \
            --s3-bucket ${{ secrets.AWS_ARTIFACTS_BUCKET }} \
            --output-template-file packaged-template.yaml

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file packaged-template.yaml \
            --stack-name eranova-technical \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides OpenAIApiKey=${{ secrets.OPENAI_API_KEY }}

      - name: Seed tax categories
        env:
          TABLE_NAME: eranova-technical
        run: uv run python scripts/seed_categories.py
